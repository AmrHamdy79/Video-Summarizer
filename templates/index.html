<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Summarizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .progress-container {
            display: none;
            margin-top: 25px;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .status-message {
            text-align: center;
            margin-top: 15px;
            color: #555;
            font-weight: 500;
        }

        .download-btn {
            display: none;
            margin-top: 20px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .download-btn:hover {
            box-shadow: 0 10px 20px rgba(17, 153, 142, 0.3);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            border-left: 4px solid #c33;
        }

        .icon {
            font-size: 3em;
            text-align: center;
            margin-bottom: 20px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .feature {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .feature-icon {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .feature-text {
            font-size: 0.9em;
            color: #666;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎥</div>
        <h1>AI Video Summarizer</h1>
        <p class="subtitle">Transform any video into a concise summary</p>

        <form id="videoForm">
            <div class="input-group">
                <label for="videoUrl">Video URL (YouTube, Vimeo, etc.)</label>
                <input type="text" id="videoUrl" name="video_url" 
                       placeholder="https://www.youtube.com/watch?v=..." 
                       required>
            </div>
            <button type="submit" id="submitBtn">Generate Summary</button>
        </form>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
            <div class="status-message" id="statusMessage">Processing your video...</div>
        </div>

        <button class="download-btn" id="downloadBtn">📥 Download PDF Summary</button>
        <div class="error-message" id="errorMessage"></div>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">🤖</div>
                <div class="feature-text">AI Powered</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-text">Smart Chunking</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📄</div>
                <div class="feature-text">Beautiful PDF</div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('videoForm');
        const submitBtn = document.getElementById('submitBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const statusMessage = document.getElementById('statusMessage');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorMessage = document.getElementById('errorMessage');
        let currentTaskId = null;

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const videoUrl = document.getElementById('videoUrl').value;
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            progressContainer.style.display = 'block';
            downloadBtn.style.display = 'none';
            errorMessage.style.display = 'none';
            
            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `video_url=${encodeURIComponent(videoUrl)}`
                });
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                currentTaskId = data.task_id;
                checkStatus();
                
            } catch (error) {
                showError(error.message);
                resetForm();
            }
        });

        async function checkStatus() {
            try {
                const response = await fetch(`/status/${currentTaskId}`);
                const data = await response.json();
                
                progressFill.style.width = data.progress + '%';
                progressFill.textContent = data.progress + '%';
                
                if (data.status === 'completed') {
                    statusMessage.textContent = '✅ Summary generated successfully!';
                    downloadBtn.style.display = 'block';
                    downloadBtn.onclick = () => {
                        window.location.href = `/download/${currentTaskId}`;
                    };
                    resetForm();
                } else if (data.status === 'error') {
                    throw new Error(data.error || 'Processing failed');
                } else {
                    setTimeout(checkStatus, 1000);
                }
                
            } catch (error) {
                showError(error.message);
                resetForm();
            }
        }

        function showError(message) {
            errorMessage.textContent = '❌ Error: ' + message;
            errorMessage.style.display = 'block';
        }

        function resetForm() {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Generate Summary';
        }
    </script>
</body>
</html>
